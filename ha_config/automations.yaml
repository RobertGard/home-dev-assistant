- id: voice_to_n8n
  alias: "Голосовая команда → n8n"
  description: "Передаёт голосовую команду из HA Assist в n8n как задачу"
  trigger:
    - platform: event
      event_type: call_service
      event_data:
        domain: conversation
        service: process
  action:
    - service: rest_command.n8n_voice_task
      data:
        prompt: "{{ trigger.event.data.service_data.text }}"
