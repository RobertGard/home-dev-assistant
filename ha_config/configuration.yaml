# Reverse proxy — должно быть ПЕРЕД default_config
http:
  use_x_forwarded_for: true
  use_x_forwarded_host: true
  trusted_proxies:
    - 127.0.0.1

# Остальной конфиг
default_config:

conversation:
api:

mobile_app:

assist_pipeline:

rest_command:
  n8n_voice_task:
    url: "http://127.0.0.1:5678/webhook/voice-task"
    method: POST
    headers:
      content-type: "application/json"
    payload: '{"prompt":"{{ prompt }}"}'

automation: !include automations.yaml
